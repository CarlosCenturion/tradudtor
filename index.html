<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <meta name="description" content="Tradudtor - Traductor de voz multilenguaje para Android e iPhone">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tradudtor">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <title>Tradudtor</title>
</head>
<body>
    <header class="header">
        <h1 class="header__title">Tradudtor</h1>
        <p class="header__subtitle">Traductor de voz universal</p>
    </header>

    <main class="main">
        <!-- Language selectors -->
        <div class="lang-bar">
            <button class="lang-bar__lang" id="sourceLangBtn" aria-label="Seleccionar idioma origen">
                <span class="lang-bar__flag" id="sourceFlag"></span>
                <span class="lang-bar__name" id="sourceLangName">Español</span>
                <svg class="lang-bar__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <button class="lang-bar__swap" id="swapBtn" aria-label="Intercambiar idiomas">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                </svg>
            </button>
            <button class="lang-bar__lang" id="targetLangBtn" aria-label="Seleccionar idioma destino">
                <span class="lang-bar__flag" id="targetFlag"></span>
                <span class="lang-bar__name" id="targetLangName">Inglés</span>
                <svg class="lang-bar__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
            </button>
        </div>

        <!-- Translator -->
        <div class="translator">
            <!-- Input panel -->
            <div class="translator__panel translator__panel--input">
                <textarea
                    class="translator__textarea"
                    id="inputText"
                    placeholder="Escribe o habla..."
                    autocomplete="off"
                    spellcheck="false"
                    enterkeyhint="done"
                ></textarea>
                <div class="translator__actions">
                    <span class="translator__charcount" id="charCount">0</span>
                    <div class="translator__actions-right">
                        <button class="translator__btn translator__btn--mic" id="micBtn" aria-label="Dictar por voz">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                                <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                                <line x1="8" y1="23" x2="16" y2="23"/>
                            </svg>
                        </button>
                        <button class="translator__btn translator__btn--speak" id="speakInputBtn" aria-label="Escuchar texto original">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <path d="M15.54 8.46a5 5 0 010 7.07"/>
                                <path d="M19.07 4.93a10 10 0 010 14.14"/>
                            </svg>
                        </button>
                        <button class="translator__btn" id="clearBtn" aria-label="Limpiar texto">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Output panel -->
            <div class="translator__panel translator__panel--output">
                <div class="translator__result" id="outputText">
                    <span class="translator__placeholder">La traducción aparecerá aquí...</span>
                </div>
                <div class="translator__actions">
                    <span class="translator__loader" id="loader" hidden>
                        <span class="spinner"></span> Traduciendo...
                    </span>
                    <div class="translator__actions-right">
                        <button class="translator__btn translator__btn--speak" id="speakOutputBtn" aria-label="Escuchar traducción" hidden>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <path d="M15.54 8.46a5 5 0 010 7.07"/>
                                <path d="M19.07 4.93a10 10 0 010 14.14"/>
                            </svg>
                        </button>
                        <button class="translator__btn translator__btn--copy" id="copyBtn" aria-label="Copiar traducción" hidden>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Voice recording overlay -->
        <div class="voice-overlay" id="voiceOverlay" hidden>
            <div class="voice-overlay__content">
                <div class="voice-overlay__waves">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <p class="voice-overlay__text">Escuchando...</p>
                <p class="voice-overlay__interim" id="interimText"></p>
                <button class="voice-overlay__stop" id="stopRecBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    Detener
                </button>
            </div>
        </div>

        <!-- Language picker modal -->
        <div class="modal" id="langModal" hidden>
            <div class="modal__backdrop" id="modalBackdrop"></div>
            <div class="modal__content">
                <div class="modal__header">
                    <h2 class="modal__title" id="modalTitle">Seleccionar idioma</h2>
                    <button class="modal__close" id="modalClose" aria-label="Cerrar">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal__search-wrap">
                    <svg class="modal__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input class="modal__search" id="langSearch" type="text" placeholder="Buscar idioma..." autocomplete="off">
                </div>
                <ul class="modal__list" id="langList"></ul>
            </div>
        </div>

        <!-- Install prompt -->
        <div class="install-banner" id="installBanner" hidden>
            <p>Instala Tradudtor en tu dispositivo</p>
            <div class="install-banner__actions">
                <button class="install-banner__btn install-banner__btn--install" id="installBtn">Instalar</button>
                <button class="install-banner__btn install-banner__btn--dismiss" id="dismissInstall">Ahora no</button>
            </div>
        </div>
    </main>

    <script src="js/languages.js"></script>
    <script src="js/translator.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
